<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/styles.css">
  <title>Banks & Buttons</title>
</head>
<body>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/config">Configure</a>
    <a href="/banks" class="active">Banks & Buttons</a>
    <a href="/diag">Diagnostics</a>
  </nav>
  <main>
    <h1>Banks & Buttons Configuration</h1>
    <div id="alert"></div>
    
    <div class="config-section">
      <h3>Panel Name</h3>
      <div class="form-group">
        <input id="panel-name-input" type="text" placeholder="Panel name" maxlength="16">
        <button type="button" id="save-panel-name-btn" class="btn-small">Save</button>
      </div>
    </div>

    <div class="config-section">
      <h3>Number of Banks</h3>
      <div style="display:flex;gap:12px;align-items:center;">
        <input id="num-banks-input" type="number" min="1" max="8" style="width:80px;">
        <button type="button" id="update-banks-btn" class="btn-small">Update</button>
        <span id="bank-count-info" style="color:#666;font-size:14px;"></span>
      </div>
    </div>

    <div class="config-section">
      <h3>Configuration Export/Import</h3>
      <p style="color:#666;font-size:13px;margin-bottom:12px;">
        <strong>Export:</strong> Download complete config as JSON. <strong>Import:</strong> Upload a saved config and select where to apply it.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button type="button" id="export-all-btn" class="btn-small">Export Everything</button>
        <button type="button" id="import-file-btn" class="btn-small">Import Config (File)</button>
        <input type="file" id="file-import-input" accept=".json" style="display:none;">
      </div>
      <div id="import-dialog" style="display:none;margin-top:16px;padding:16px;border:1px solid #ccc;border-radius:4px;background:#f9f9f9;">
        <h4 style="margin-top:0;">Where to Import?</h4>
        <label style="display:block;margin:8px 0;">
          <input type="radio" name="import-mode" value="all" checked> Replace entire config
        </label>
        <label style="display:block;margin:8px 0;">
          <input type="radio" name="import-mode" value="bank"> Replace a specific bank:
          <select id="import-bank-select" style="margin-left:8px;padding:4px;" disabled>
            <option>Select bank...</option>
          </select>
        </label>
        <label style="display:block;margin:8px 0;">
          <input type="radio" name="import-mode" value="button"> Replace a specific button:
          <div style="margin-left:20px;margin-top:8px;">
            Bank: <select id="import-bank-for-button" style="padding:4px;" disabled>
              <option>Select bank...</option>
            </select>
            Button: <select id="import-button-select" style="padding:4px;margin-left:8px;" disabled>
              <option>Select button...</option>
            </select>
          </div>
        </label>
        <div style="margin-top:16px;display:flex;gap:8px;">
          <button type="button" id="import-confirm-btn" class="btn-small">Confirm Import</button>
          <button type="button" id="import-cancel-btn" class="btn-small" style="background:#ccc;">Cancel</button>
        </div>
      </div>
    </div>

    <div id="banks-container" style="margin-top:24px;">
      <!-- Banks will be populated here -->
    </div>

    <div style="margin-top:24px;text-align:center;">
      <button id="save-all-btn" type="button" style="padding:12px 24px;font-size:16px;">Save All Changes</button>
    </div>
  </main>
  <script src="/static/app.js"></script>
  <script>
    async function initBanks() {
      try {
        const cfg = await fetchJson('/api/config');
        renderBanksUI(cfg);
        
        document.getElementById('panel-name-input').value = cfg.panel_name || '';
        document.getElementById('num-banks-input').value = cfg.num_banks;
        
        document.getElementById('save-panel-name-btn').addEventListener('click', async () => {
          const newName = document.getElementById('panel-name-input').value;
          cfg.panel_name = newName;
          await saveConfig(cfg);
        });
        
        document.getElementById('update-banks-btn').addEventListener('click', async () => {
          const newNum = parseInt(document.getElementById('num-banks-input').value) || 1;
          if (newNum < 1 || newNum > 8) {
            showAlert('Number of banks must be between 1 and 8', 'error');
            return;
          }
          if (newNum < cfg.num_banks) {
            if (!confirm(`Reducing banks from ${cfg.num_banks} to ${newNum}. Banks ${newNum + 1}-${cfg.num_banks} will be lost. Continue?`)) {
              document.getElementById('num-banks-input').value = cfg.num_banks;
              return;
            }
            cfg.banks.splice(newNum); // truncate
          } else if (newNum > cfg.num_banks) {
            // initialize new banks with defaults
            for (let nb = cfg.num_banks; nb < newNum; nb++) {
              cfg.banks[nb] = createDefaultBank(nb+1);
            }
          }
          cfg.num_banks = newNum;
          renderBanksUI(cfg);
        });
        
        document.getElementById('save-all-btn').addEventListener('click', async () => {
          await saveConfig(cfg);
        });
        
      } catch (e) {
        console.error(e);
        showAlert('Failed to load configuration: ' + e.message, 'error');
      }
    }
    
    function renderBanksUI(cfg) {
      const container = document.getElementById('banks-container');
      container.innerHTML = '';
      
      for (let b = 0; b < cfg.num_banks; b++) {
        const bank = cfg.banks[b];
        const bankDiv = document.createElement('div');
        bankDiv.className = 'bank-card';
        bankDiv.innerHTML = `
          <div class="bank-header">
            <div>
              <label>Bank ${b + 1} Name:</label>
              <input type="text" class="bank-name" maxlength="16" value="${bank.bank_name || ''}">
            </div>
          </div>
          <div class="buttons-grid">
        `;
        
        for (let i = 0; i < cfg.banks[b].buttons.length; i++) {
            const btn = cfg.banks[b].buttons[i];
          bankDiv.innerHTML += `
            <div class="button-card">
              <div class="button-header">
                  <input type="text" class="btn-name" placeholder="Button name" maxlength="16" value="${btn.display_name || ''}">
                  <button class="btn-small copy-btn" title="Copy button">Copy</button>
                  <button class="btn-small paste-btn" title="Paste button">Paste</button>
              </div>
              <div class="form-group">
                <label>HA Entity ID</label>
                <input type="text" class="btn-topic" placeholder="e.g., sanctuary_systems_on" maxlength="63" value="${btn.entity_id || btn.mqtt_topic || ''}">
              </div>
              <div class="form-group">
                <label>Button Type</label>
                <select class="btn-type">
                  <option value="0" ${btn.type === 0 ? 'selected' : ''}>Toggle</option>
                  <option value="1" ${btn.type === 1 ? 'selected' : ''}>Momentary</option>
                  <option value="2" ${btn.type === 2 ? 'selected' : ''}>Radio</option>
                </select>
              </div>
              <div class="form-group ${btn.type === 2 ? '' : 'hidden'}">
                <label>Radio Group</label>
                <input type="number" class="btn-radio-group" min="0" max="255" value="${btn.radio_group || 0}">
              </div>
              <div class="color-section">
                <label>LED Colors</label>
                <div style="display:flex;gap:12px;">
                  <div>
                    <small>On</small>
                    <input type="color" class="btn-color-on" value="#${toHex(btn.color_on || [0,0,0])}">
                  </div>
                  <div>
                    <small>Off</small>
                    <input type="color" class="btn-color-off" value="#${toHex(btn.color_off || [0,0,0])}">
                  </div>
                </div>
              </div>
            </div>
          `;
        }
        
        bankDiv.innerHTML += '</div>';
        container.appendChild(bankDiv);
      }
      
      // Wire up dynamic events
      document.querySelectorAll('.btn-type').forEach((select, idx) => {
        select.addEventListener('change', (e) => {
          const radioGroupField = e.target.closest('.button-card').querySelector('.btn-radio-group').parentElement;
          radioGroupField.classList.toggle('hidden', e.target.value !== '2');
        });
      });

      // Copy/paste logic: system clipboard (works cross-panel, cross-IP)
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const card = e.target.closest('.button-card');
          const buttonData = collectButtonCard(card);
          const payload = serializeButtonPayload(buttonData);
          
          // Primary: system clipboard (works cross-panel in same browser)
          if (navigator.clipboard && navigator.clipboard.writeText) {
            try {
              await navigator.clipboard.writeText(payload);
              showAlert('✓ Button copied to clipboard (works cross-panel)', 'success');
              return;
            } catch (err) {
              showAlert(`⚠ Clipboard denied: ${err.message}. Try Export instead.`, 'error');
              return;
            }
          }
          showAlert('⚠ Clipboard API unavailable. Use Export/Import buttons.', 'error');
        });
      });
      
      document.querySelectorAll('.paste-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          if (!navigator.clipboard || !navigator.clipboard.readText) {
            showAlert('⚠ Clipboard API unavailable. Use Import button instead.', 'error');
            return;
          }
          
          let data = null;
          try {
            const clipText = await navigator.clipboard.readText();
            data = deserializeButtonPayload(clipText);
          } catch (err) {
            showAlert(`⚠ Clipboard denied: ${err.message}. Try Import instead.`, 'error');
            return;
          }
          
          if (!data) {
            showAlert('✗ Clipboard is empty. Copy a button first.', 'error');
            return;
          }
          
          const card = e.target.closest('.button-card');
          applyButtonCard(card, data);
          showAlert('✓ Pasted settings to button (save to persist)', 'success');
        });
      });
      
      // Export ALL config: download complete config as JSON file
      document.getElementById('export-all-btn').addEventListener('click', () => {
        // Collect current config from UI
        const fullCfg = {
          type: 'mqtt-panel-config-v1',
          data: {
            panel_name: document.getElementById('panel-name-input').value,
            num_banks: parseInt(document.getElementById('num-banks-input').value),
            banks: []
          }
        };
        
        document.querySelectorAll('.bank-card').forEach((bankDiv, b) => {
          const bank = {
            bank_name: bankDiv.querySelector('.bank-name').value,
            buttons: []
          };
          bankDiv.querySelectorAll('.button-card').forEach((btnDiv) => {
            bank.buttons.push(collectButtonCard(btnDiv));
          });
          fullCfg.data.banks.push(bank);
        });
        
        const payload = JSON.stringify(fullCfg, null, 2);
        const blob = new Blob([payload], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'panel-config-export.json';
        link.click();
        URL.revokeObjectURL(url);
        showAlert('✓ Full config exported to panel-config-export.json', 'success');
      });
      
      // Import button: upload config from JSON file
      let pendingImportConfig = null;
      document.getElementById('import-file-btn').addEventListener('click', () => {
        document.getElementById('file-import-input').click();
      });
      
      document.getElementById('file-import-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const payload = ev.target.result;
            const parsed = JSON.parse(payload);
            
            // Detect format: single button or full config
            let importData = null;
            if (parsed && parsed.type === 'mqtt-button-config-v1' && parsed.data) {
              // Single button format
              importData = { type: 'button', data: parsed.data };
            } else if (parsed && parsed.type === 'mqtt-panel-config-v1' && parsed.data) {
              // Full config format
              importData = { type: 'panel', data: parsed.data };
            } else {
              showAlert('✗ Unknown config file format', 'error');
              e.target.value = '';
              return;
            }
            
            pendingImportConfig = importData;
            
            // Show import dialog and populate bank/button selects
            const dialog = document.getElementById('import-dialog');
            dialog.style.display = 'block';
            
            // Get bank list from current UI
            const bankCards = document.querySelectorAll('.bank-card');
            const bankSelects = [
              document.getElementById('import-bank-select'),
              document.getElementById('import-bank-for-button')
            ];
            
            bankSelects.forEach(sel => {
              sel.innerHTML = '<option>Select bank...</option>';
              bankCards.forEach((card, idx) => {
                const bankName = card.querySelector('.bank-name').value || `Bank ${idx + 1}`;
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `Bank ${idx + 1}: ${bankName}`;
                sel.appendChild(opt);
              });
              sel.disabled = true;
            });
            
            document.getElementById('import-button-select').innerHTML = '<option>Select button...</option>';
            document.getElementById('import-button-select').disabled = true;
            
            // Wire up mode change to enable/disable selects
            document.querySelectorAll('input[name="import-mode"]').forEach(radio => {
              radio.addEventListener('change', () => {
                document.getElementById('import-bank-select').disabled = radio.value !== 'bank';
                document.getElementById('import-bank-for-button').disabled = radio.value !== 'button';
                document.getElementById('import-button-select').disabled = radio.value !== 'button';
              });
            });
            
            // Wire up bank select for button import to populate button list
            document.getElementById('import-bank-for-button').addEventListener('change', (evt) => {
              const bankIdx = parseInt(evt.target.value);
              const bankCard = document.querySelectorAll('.bank-card')[bankIdx];
              const buttonSelect = document.getElementById('import-button-select');
              buttonSelect.innerHTML = '<option>Select button...</option>';
              if (bankCard) {
                const buttonCards = bankCard.querySelectorAll('.button-card');
                buttonCards.forEach((card, bidx) => {
                  const btnName = card.querySelector('.btn-name').value || `Button ${bidx + 1}`;
                  const opt = document.createElement('option');
                  opt.value = bidx;
                  opt.textContent = `Button ${bidx + 1}: ${btnName}`;
                  buttonSelect.appendChild(opt);
                });
              }
            });
            
          } catch (err) {
            showAlert(`✗ Error reading file: ${err.message}`, 'error');
          }
          e.target.value = '';
        };
        reader.readAsText(file);
      });
      
      // Import dialog: confirm button
      document.getElementById('import-confirm-btn').addEventListener('click', () => {
        if (!pendingImportConfig) {
          showAlert('✗ No config loaded', 'error');
          return;
        }
        
        const mode = document.querySelector('input[name="import-mode"]:checked').value;
        const dialog = document.getElementById('import-dialog');
        dialog.style.display = 'none';
        
        if (pendingImportConfig.type === 'button') {
          // Single button: apply to first button
          const firstCard = document.querySelector('.button-card');
          if (firstCard) {
            applyButtonCard(firstCard, pendingImportConfig.data);
            showAlert('✓ Imported button config (save to persist)', 'success');
          }
        } else if (pendingImportConfig.type === 'panel') {
          const cfgData = pendingImportConfig.data;
          
          if (mode === 'all') {
            // Replace entire config: use existing renderer to ensure consistent layout
            if (cfgData.panel_name) {
              document.getElementById('panel-name-input').value = cfgData.panel_name;
            }
            if (cfgData.num_banks && cfgData.banks.length > 0) {
              document.getElementById('num-banks-input').value = cfgData.num_banks;
              // Render using the centralized renderer so color layout matches
              renderBanksUI({ num_banks: cfgData.num_banks, banks: cfgData.banks });
              showAlert('✓ Imported entire config (save to persist)', 'success');
            }
          } else if (mode === 'bank') {
            // Replace specific bank
            const bankIdx = parseInt(document.getElementById('import-bank-select').value);
            if (isNaN(bankIdx)) {
              showAlert('✗ Please select a bank', 'error');
              return;
            }
            if (cfgData.banks && cfgData.banks[0]) {
              const bankCards = document.querySelectorAll('.bank-card');
              const targetBank = bankCards[bankIdx];
              if (targetBank) {
                targetBank.querySelector('.bank-name').value = cfgData.banks[0].bank_name || `Bank ${bankIdx + 1}`;
                cfgData.banks[0].buttons.forEach((btn, bidx) => {
                  const cards = targetBank.querySelectorAll('.button-card');
                  if (cards[bidx]) {
                    applyButtonCard(cards[bidx], btn);
                  }
                });
                showAlert(`✓ Imported bank to Bank ${bankIdx + 1} (save to persist)`, 'success');
              }
            }
          } else if (mode === 'button') {
            // Replace specific button
            const bankIdx = parseInt(document.getElementById('import-bank-for-button').value);
            const buttonIdx = parseInt(document.getElementById('import-button-select').value);
            if (isNaN(bankIdx) || isNaN(buttonIdx)) {
              showAlert('✗ Please select a bank and button', 'error');
              return;
            }
            if (cfgData.banks && cfgData.banks[0] && cfgData.banks[0].buttons[0]) {
              const bankCards = document.querySelectorAll('.bank-card');
              const targetBank = bankCards[bankIdx];
              if (targetBank) {
                const buttons = targetBank.querySelectorAll('.button-card');
                if (buttons[buttonIdx]) {
                  applyButtonCard(buttons[buttonIdx], cfgData.banks[0].buttons[0]);
                  showAlert(`✓ Imported button to Bank ${bankIdx + 1}, Button ${buttonIdx + 1} (save to persist)`, 'success');
                }
              }
            }
          }
        }
        
        pendingImportConfig = null;
      });
      
      // Import dialog: cancel button
      document.getElementById('import-cancel-btn').addEventListener('click', () => {
        const dialog = document.getElementById('import-dialog');
        dialog.style.display = 'none';
        pendingImportConfig = null;
        showAlert('✗ Import cancelled', 'error');
      });
    }
    
    async function saveConfig(cfg) {
      // Collect all values from the UI
      const panelNameInput = document.getElementById('panel-name-input');
      cfg.panel_name = panelNameInput.value;
      
      document.querySelectorAll('.bank-card').forEach((bankDiv, b) => {
        const bankNameInput = bankDiv.querySelector('.bank-name');
        cfg.banks[b].bank_name = bankNameInput.value;
        
        bankDiv.querySelectorAll('.button-card').forEach((btnDiv, i) => {
          cfg.banks[b].buttons[i].display_name = btnDiv.querySelector('.btn-name').value;
          cfg.banks[b].buttons[i].entity_id = btnDiv.querySelector('.btn-topic').value;
          cfg.banks[b].buttons[i].type = parseInt(btnDiv.querySelector('.btn-type').value);
          cfg.banks[b].buttons[i].radio_group = parseInt(btnDiv.querySelector('.btn-radio-group').value);
          
          const onColor = btnDiv.querySelector('.btn-color-on').value;
          const offColor = btnDiv.querySelector('.btn-color-off').value;
          cfg.banks[b].buttons[i].color_on = hexToRgb(onColor);
          cfg.banks[b].buttons[i].color_off = hexToRgb(offColor);
        });
      });
      
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        });
        if (res.ok) {
          showAlert('✓ All configuration saved successfully', 'success');
        } else {
          showAlert('✗ Failed to save configuration', 'error');
        }
      } catch (e) {
        showAlert('✗ Error: ' + e.message, 'error');
      }
    }
    
    function toHex(rgb) {
      return rgb.map(x => (x || 0).toString(16).padStart(2, '0')).join('');
    }
    
    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? [parseInt(result[1], 16), parseInt(result[2], 16), parseInt(result[3], 16)] : [0, 0, 0];
    }

    function createDefaultBank(index) {
      const bank = { bank_name: `Bank ${index}`, buttons: [] };
      for (let i = 0; i < 4; i++) {
        bank.buttons.push({
          display_name: `Btn ${i+1}`,
          entity_id: `bank${index}_btn${i+1}`,
          type: 0,
          radio_group: 0,
          color_on: [0,255,0],
          color_off: [255,0,0]
        });
      }
      return bank;
    }

    function collectButtonCard(card) {
      const entityId = card.querySelector('.btn-topic').value;
      return {
        display_name: card.querySelector('.btn-name').value,
        entity_id: entityId,
        type: parseInt(card.querySelector('.btn-type').value),
        radio_group: parseInt(card.querySelector('.btn-radio-group')?.value || 0),
        color_on: hexToRgb(card.querySelector('.btn-color-on').value),
        color_off: hexToRgb(card.querySelector('.btn-color-off').value)
      };
    }

    function serializeButtonPayload(data) {
      return JSON.stringify({
        type: 'mqtt-button-config-v1',
        data
      });
    }

    function deserializeButtonPayload(raw) {
      if (!raw || typeof raw !== 'string') return null;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.type === 'mqtt-button-config-v1' && parsed.data) {
          return parsed.data;
        }
      } catch (_) {
        return null;
      }
      return null;
    }

    function applyButtonCard(card, data) {
      card.querySelector('.btn-name').value = data.display_name || '';
      card.querySelector('.btn-topic').value = data.entity_id || data.mqtt_topic || '';
      card.querySelector('.btn-type').value = String(data.type || 0);
      const rg = card.querySelector('.btn-radio-group'); 
      if (rg) rg.value = data.radio_group || 0;
      card.querySelector('.btn-color-on').value = `#${toHex(data.color_on || [0,0,0])}`;
      card.querySelector('.btn-color-off').value = `#${toHex(data.color_off || [0,0,0])}`;
      
      // Toggle radio group visibility based on button type
      const rgField = card.querySelector('.btn-radio-group')?.parentElement;
      if (rgField) {
        rgField.classList.toggle('hidden', data.type !== 2);
      }
    }
    
    function showAlert(msg, type) {
      const alertDiv = document.getElementById('alert');
      const className = type === 'error' ? 'alert error' : 'alert success';
      alertDiv.innerHTML = `<div class="${className}">${msg}</div>`;
      if (type === 'success') {
        setTimeout(() => alertDiv.innerHTML = '', 3000);
      }
    }
    
    if (location.pathname === '/banks') initBanks();
  </script>
</body>
</html>
