<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/styles.css">
  <title>Panel Configuration</title>
</head>
<body>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/config" class="active">Configure</a>
    <a href="/banks">Banks & Buttons</a>
    <a href="/diag">Diagnostics</a>
  </nav>
  <main>
    <h1>Configuration</h1>
    <div id="alert"></div>
    <form id="config-form">
      <div class="form-group">
        <label>Panel Name</label>
        <input name="panel_name" placeholder="e.g., Sanctuary Lights">
      </div>
      <h3>MQTT Settings</h3>
      <div class="form-group">
        <label>Broker IP Address</label>
        <input name="mqtt.broker_ip" placeholder="192.168.1.100">
      </div>
      <div class="form-group">
        <label>Broker Port</label>
        <input name="mqtt.port" placeholder="1883">
      </div>
      <div class="form-group">
        <label>Username (optional)</label>
        <input name="mqtt.username" placeholder="user">
      </div>
      <div class="form-group">
        <label>Password (optional)</label>
        <input name="mqtt.password" type="password" placeholder="password">
      </div>
      <h3>WiFi Settings</h3>
      <div class="form-group">
        <label>WiFi SSID</label>
        <input name="wifi.ssid" placeholder="Network Name">
      </div>
      <div class="form-group">
        <label>WiFi Password</label>
        <input name="wifi.password" type="password" placeholder="Password">
      </div>
      <div class="form-group">
        <label><input type="checkbox" name="wifi.use_dhcp" id="use_dhcp"> Use DHCP (Automatic IP)</label>
      </div>
      <fieldset id="static-ip-fields" style="display:none">
        <legend>Static IP Configuration</legend>
        <div class="form-group">
          <label>IP Address</label>
          <input name="wifi.static_ip" placeholder="192.168.1.50">
        </div>
        <div class="form-group">
          <label>Netmask</label>
          <input name="wifi.static_netmask" placeholder="255.255.255.0">
        </div>
        <div class="form-group">
          <label>Gateway</label>
          <input name="wifi.static_gateway" placeholder="192.168.1.1">
        </div>
      </fieldset>
      <button type="submit">Save Configuration</button>
    </form>
    <div style="margin-top:24px;padding-top:24px;border-top:1px solid #ddd;">
      <h3>Device Management</h3>
      <button id="restart-btn" type="button" style="background:#e74c3c;">Restart Device</button>
    </div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
